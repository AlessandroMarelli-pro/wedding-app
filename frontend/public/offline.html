<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Ariane & Timothe Wedding</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #374151;
      }

      .container {
        text-align: center;
        max-width: 500px;
        padding: 2rem;
      }

      .heart {
        font-size: 4rem;
        color: #ec4899;
        margin-bottom: 1rem;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
        color: #1f2937;
      }

      p {
        font-size: 1.1rem;
        margin-bottom: 2rem;
        line-height: 1.6;
        color: #6b7280;
      }

      .retry-btn {
        background: linear-gradient(135deg, #ec4899, #be185d);
        color: white;
        border: none;
        padding: 1rem 2rem;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .retry-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(236, 72, 153, 0.3);
      }

      .retry-btn:active {
        transform: translateY(0);
      }

      .status {
        margin-top: 2rem;
        padding: 1rem;
        background: rgba(255, 255, 255, 0.8);
        border-radius: 0.5rem;
        font-size: 0.9rem;
        color: #6b7280;
      }

      .online {
        color: #059669;
      }

      .offline {
        color: #dc2626;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="heart">💕</div>
      <h1>You're Offline</h1>
      <p>
        Don't worry! You can still view the wedding information we've saved for
        you. Check your internet connection and try again.
      </p>
      <button class="retry-btn" onclick="window.location.reload()">
        Try Again
      </button>
      <div class="status" id="status">
        <span class="offline">●</span> You're currently offline
      </div>
    </div>

    <script>
      // Update status indicator
      function updateStatus() {
        const statusEl = document.getElementById('status');
        if (navigator.onLine) {
          statusEl.innerHTML =
            '<span class="online">●</span> You\'re back online!';
          setTimeout(() => {
            window.location.reload();
          }, 1000);
        } else {
          statusEl.innerHTML =
            '<span class="offline">●</span> You\'re currently offline';
        }
      }

      // Listen for online/offline events
      window.addEventListener('online', updateStatus);
      window.addEventListener('offline', updateStatus);

      // Initial status check
      updateStatus();
    </script>
  </body>
</html>
