<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#1a1a2e"/>
  
  <!-- Easter egg shape -->
  <ellipse cx="200" cy="200" rx="120" ry="160" fill="#ff6b6b" stroke="#ff5252" stroke-width="4"/>
  
  <!-- Decorative patterns -->
  <circle cx="160" cy="160" r="15" fill="#4ecdc4"/>
  <circle cx="240" cy="160" r="15" fill="#4ecdc4"/>
