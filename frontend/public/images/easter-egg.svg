    <polygon points="300,80 305,90 315,90 307,97 310,107 300,100 290,107 293,97 285,90 295,90" opacity="0.8"/>
    <polygon points="80,300 85,310 95,310 87,317 90,327 80,320 70,327 73,317 65,310 75,310" opacity="0.8"/>
    <polygon points="320,320 325,330 335,330 327,337 330,347 320,340 310,347 313,337 305,330 315,330" opacity="0.8"/>
