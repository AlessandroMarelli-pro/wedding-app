openapi: 3.0.0
info:
  title: Ariane & Timothe Wedding API
  description: REST API for wedding website management and RSVP system
  version: 1.0.0
  contact:
    name: Wedding Website API

servers:
  - url: http://localhost:3001/api
    description: Development server

components:
  schemas:
    # Authentication
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        expiresIn:
          type: number

    # Wedding Information
    WeddingInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        coupleNames:
          type: string
          maxLength: 100
        presentationMessage:
          type: string
          maxLength: 2000
        weddingAddress:
          type: string
          maxLength: 300
        weddingDate:
          type: string
          format: date-time
        locationDirections:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # Accommodations
    Accommodation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500
        address:
          type: string
          maxLength: 300
        contactInfo:
          type: string
          maxLength: 200
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        priceRange:
          type: string
          maxLength: 50
        isRecommended:
          type: boolean
        displayOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # RSVP
    RSVPRequest:
      type: object
      required: [hashCode]
      properties:
        hashCode:
          type: string
          minLength: 8
          maxLength: 8
          pattern: "^[A-Z0-9]{8}$"

    RSVPResponse:
      type: object
      properties:
        success:
          type: boolean
        guestName:
          type: string
        message:
          type: string
        confirmedAt:
          type: string
          format: date-time

    # Program Events
    ProgramEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 100
        description:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        location:
          type: string
          maxLength: 200
        displayOrder:
          type: integer
        includeInCalendar:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # Guest
    Guest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
          maxLength: 100
        lastName:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        phoneNumber:
          type: string
          maxLength: 20
        hashCode:
          type: string
          minLength: 8
          maxLength: 8
        partySize:
          type: integer
          minimum: 1
        dietaryRestrictions:
          type: string
          maxLength: 500
        specialRequests:
          type: string
          maxLength: 1000
        uploadId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # CSV Upload
    CSVUpload:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        originalFilename:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]
        totalRows:
          type: integer
        processedRows:
          type: integer
        validRows:
          type: integer
        invalidRows:
          type: integer
        errors:
          type: array
          items:
            type: object
            properties:
              row:
                type: integer
              field:
                type: string
              message:
                type: string
        uploadedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # Uploaded Image
    UploadedImage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        filename:
          type: string
        originalFilename:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        altText:
          type: string
        category:
          type: string
        uploadedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # RSVP Confirmation
    RSVPConfirmation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        guestId:
          type: string
          format: uuid
        confirmedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # RSVP Statistics
    RSVPStats:
      type: object
      properties:
        totalGuests:
          type: integer
        confirmedGuests:
          type: integer
        pendingGuests:
          type: integer
        confirmationRate:
          type: number
          format: float
        totalPartySize:
          type: integer
        confirmedPartySize:
          type: integer
        recentConfirmations:
          type: array
          items:
            type: object
            properties:
              guestName:
                type: string
              confirmedAt:
                type: string
                format: date-time

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  # Authentication
  /auth/login:
    post:
      tags: [Authentication]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials

  # Public Wedding Information
  /wedding:
    get:
      tags: [Public]
      summary: Get wedding information
      responses:
        "200":
          description: Wedding information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeddingInfo"

  # Public Accommodations
  /accommodations:
    get:
      tags: [Public]
      summary: Get all accommodations
      responses:
        "200":
          description: List of accommodations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Accommodation"

  # Public Program
  /program:
    get:
      tags: [Public]
      summary: Get wedding program events
      responses:
        "200":
          description: Program events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgramEvent"

  # Public Calendar Export
  /program/calendar:
    get:
      tags: [Public]
      summary: Download calendar file (.ics)
      responses:
        "200":
          description: Calendar file
          content:
            text/calendar:
              schema:
                type: string
                format: binary

  # Public RSVP
  /rsvp:
    post:
      tags: [Public]
      summary: Submit RSVP with hash code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RSVPRequest"
      responses:
        "200":
          description: RSVP confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RSVPResponse"
        "400":
          description: Invalid hash code or already confirmed

  # Admin endpoints (protected)
  /admin/wedding:
    put:
      tags: [Admin]
      summary: Update wedding information
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeddingInfo"
      responses:
        "200":
          description: Wedding info updated

  /admin/guests/upload:
    post:
      tags: [Admin]
      summary: Upload CSV file with guests
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: CSV upload initiated

  /admin/guests:
    get:
      tags: [Admin]
      summary: Get all guests with pagination and search
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of guests

  /admin/guests/uploads:
    get:
      tags: [Admin]
      summary: Get all CSV uploads
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of CSV uploads

  /admin/guests/uploads/{id}:
    get:
      tags: [Admin]
      summary: Get CSV upload details
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CSV upload details

  /admin/guests/uploads/{id}/report:
    get:
      tags: [Admin]
      summary: Get detailed CSV upload report
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Detailed upload report

  /admin/guests/uploads/{id}/guests:
    get:
      tags: [Admin]
      summary: Get guests from specific upload
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Guests from upload
    delete:
      tags: [Admin]
      summary: Delete all guests from a specific upload
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Guests deleted

  /admin/guests/validation-stats:
    get:
      tags: [Admin]
      summary: Get CSV validation statistics
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Validation statistics

  /admin/guests/export:
    get:
      tags: [Admin]
      summary: Export all guest data as CSV
      security:
        - BearerAuth: []
      responses:
        "200":
          description: CSV file download

  /admin/guests/export/data:
    get:
      tags: [Admin]
      summary: Get guest export data as JSON
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Guest data as JSON

  /admin/guests/{id}:
    delete:
      tags: [Admin]
      summary: Delete a guest
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Guest deleted

  /admin/accommodations:
    post:
      tags: [Admin]
      summary: Create new accommodation
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Accommodation"
      responses:
        "201":
          description: Accommodation created
    get:
      tags: [Admin]
      summary: Get all accommodations (admin view)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of accommodations

  /admin/accommodations/{id}:
    put:
      tags: [Admin]
      summary: Update accommodation
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Accommodation"
      responses:
        "200":
          description: Accommodation updated
    delete:
      tags: [Admin]
      summary: Delete accommodation
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Accommodation deleted

  /admin/seed/accommodations:
    post:
      tags: [Admin]
      summary: Seed default accommodations
      security:
        - BearerAuth: []
      responses:
        "201":
          description: Default accommodations seeded

  /admin/program:
    post:
      tags: [Admin]
      summary: Create new program event
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgramEvent"
      responses:
        "201":
          description: Program event created
    get:
      tags: [Admin]
      summary: Get all program events (admin view)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of program events
    put:
      tags: [Admin]
      summary: Reorder program events
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  displayOrder:
                    type: integer
      responses:
        "200":
          description: Program events reordered

  /admin/program/{id}:
    put:
      tags: [Admin]
      summary: Update program event
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgramEvent"
      responses:
        "200":
          description: Program event updated
    delete:
      tags: [Admin]
      summary: Delete program event
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Program event deleted

  /admin/rsvp/confirmations:
    get:
      tags: [Admin]
      summary: Get all RSVP confirmations
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of confirmations

  /admin/rsvp/stats:
    get:
      tags: [Admin]
      summary: Get RSVP statistics
      security:
        - BearerAuth: []
      responses:
        "200":
          description: RSVP statistics

  /admin/rsvp/confirmed:
    get:
      tags: [Admin]
      summary: Get list of confirmed guests
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of confirmed guests

  /admin/rsvp/pending:
    get:
      tags: [Admin]
      summary: Get list of pending guests
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of pending guests

  /admin/rsvp/recent:
    get:
      tags: [Admin]
      summary: Get recent confirmations
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent confirmations

  /admin/rsvp/confirmations/{id}:
    delete:
      tags: [Admin]
      summary: Delete RSVP confirmation
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Confirmation deleted

  /admin/images/upload:
    post:
      tags: [Admin]
      summary: Upload an image
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                altText:
                  type: string
                category:
                  type: string
      responses:
        "201":
          description: Image uploaded

  /admin/images:
    get:
      tags: [Admin]
      summary: Get all uploaded images with pagination
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of images

  /admin/images/{id}:
    get:
      tags: [Admin]
      summary: Get image metadata by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image metadata
    put:
      tags: [Admin]
      summary: Update image metadata
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                altText:
                  type: string
                category:
                  type: string
      responses:
        "200":
          description: Image metadata updated
    delete:
      tags: [Admin]
      summary: Delete an image
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image deleted

  /admin/images/{id}/thumbnail:
    post:
      tags: [Admin]
      summary: Generate thumbnail for an image
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                width:
                  type: integer
                  default: 300
                height:
                  type: integer
                  default: 300
      responses:
        "200":
          description: Thumbnail generated

  /admin/images/{id}/optimize:
    post:
      tags: [Admin]
      summary: Optimize image for web
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image optimized

  /admin/images/cleanup:
    post:
      tags: [Admin]
      summary: Clean up orphaned image files
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Cleanup completed

  /admin/system/cleanup:
    post:
      tags: [Admin]
      summary: Manual cleanup of temporary and orphaned files
      security:
        - BearerAuth: []
      responses:
        "200":
          description: System cleanup completed

  /admin/system/storage:
    get:
      tags: [Admin]
      summary: Get storage usage statistics
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Storage statistics

  /admin/system/health:
    get:
      tags: [Admin]
      summary: Check upload system health
      security:
        - BearerAuth: []
      responses:
        "200":
          description: System health status

  /admin/analytics/rsvp:
    get:
      tags: [Admin]
      summary: Get comprehensive RSVP analytics
      security:
        - BearerAuth: []
      responses:
        "200":
          description: RSVP analytics

  /admin/analytics/dashboard:
    get:
      tags: [Admin]
      summary: Get dashboard summary statistics
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Dashboard statistics

  /admin/analytics/uploads:
    get:
      tags: [Admin]
      summary: Get upload analytics and statistics
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Upload analytics

tags:
  - name: Public
    description: Public endpoints (no authentication)
  - name: Authentication
    description: Admin login endpoints
  - name: Admin
    description: Admin-only endpoints (requires authentication)
