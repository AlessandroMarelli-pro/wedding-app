openapi: 3.0.0
info:
  title: Ariane & Timothe Wedding API
  description: REST API for wedding website management and RSVP system
  version: 1.0.0
  contact:
    name: Wedding Website API

servers:
  - url: http://localhost:3001/api
    description: Development server

components:
  schemas:
    # Authentication
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    
    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        expiresIn:
          type: number
    
    # Wedding Information
    WeddingInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        coupleNames:
          type: string
          maxLength: 100
        presentationMessage:
          type: string
          maxLength: 2000
        weddingAddress:
          type: string
          maxLength: 300
        weddingDate:
          type: string
          format: date-time
        locationDirections:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    # Accommodations
    Accommodation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500
        address:
          type: string
          maxLength: 300
        contactInfo:
          type: string
          maxLength: 200
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        priceRange:
          type: string
          maxLength: 50
        isRecommended:
          type: boolean
        displayOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    
    # RSVP
    RSVPRequest:
      type: object
      required: [hashCode]
      properties:
        hashCode:
          type: string
          minLength: 8
          maxLength: 8
          pattern: '^[A-Z0-9]{8}$'
    
    RSVPResponse:
      type: object
      properties:
        success:
          type: boolean
        guestName:
          type: string
        message:
          type: string
        confirmedAt:
          type: string
          format: date-time
    
    # Program Events
    ProgramEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 100
        description:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        location:
          type: string
          maxLength: 200
        displayOrder:
          type: integer
        includeInCalendar:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  # Authentication
  /auth/login:
    post:
      tags: [Authentication]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
  
  # Public Wedding Information
  /wedding:
    get:
      tags: [Public]
      summary: Get wedding information
      responses:
        '200':
          description: Wedding information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeddingInfo'
  
  # Public Accommodations
  /accommodations:
    get:
      tags: [Public]
      summary: Get all accommodations
      responses:
        '200':
          description: List of accommodations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Accommodation'
  
  # Public Program
  /program:
    get:
      tags: [Public]
      summary: Get wedding program events
      responses:
        '200':
          description: Program events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProgramEvent'
  
  # Public Calendar Export
  /program/calendar:
    get:
      tags: [Public]
      summary: Download calendar file (.ics)
      responses:
        '200':
          description: Calendar file
          content:
            text/calendar:
              schema:
                type: string
                format: binary
  
  # Public RSVP
  /rsvp:
    post:
      tags: [Public]
      summary: Submit RSVP with hash code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RSVPRequest'
      responses:
        '200':
          description: RSVP confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RSVPResponse'
        '400':
          description: Invalid hash code or already confirmed
  
  # Admin endpoints (protected)
  /admin/wedding:
    put:
      tags: [Admin]
      summary: Update wedding information
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeddingInfo'
      responses:
        '200':
          description: Wedding info updated
  
  /admin/guests/upload:
    post:
      tags: [Admin]
      summary: Upload CSV file with guests
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: CSV upload initiated

tags:
  - name: Public
    description: Public endpoints (no authentication)
  - name: Authentication
    description: Admin login endpoints
  - name: Admin
    description: Admin-only endpoints (requires authentication)